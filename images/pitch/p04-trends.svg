<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Two heart-rate waves synchronizing">
  <defs>
    <radialGradient id="h4-bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#c96b6b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c96b6b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="h4-wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#c9a84c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="h4-wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d9e8a" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#2d9e8a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2d9e8a" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#h4-bg)"/>
  <!-- Wave 1 (Matthi / gold) - starts desynced, converges -->
  <path d="M 20,160 Q 50,160 60,150 T 80,130 T 100,160 T 130,170 T 160,150 T 200,155 T 240,175 T 280,150 T 320,155 T 380,155"
        fill="none" stroke="url(#h4-wave1)" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <!-- Wave 2 (Dascha / teal) - converges to match -->
  <path d="M 20,250 Q 50,240 60,260 T 90,275 T 120,250 T 150,240 T 180,230 T 210,230 T 240,240 T 280,235 T 320,240 T 380,245"
        fill="none" stroke="url(#h4-wave2)" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <!-- Converging lines (sync moment) -->
  <g stroke="#f5f0e8" stroke-width="0.4" stroke-dasharray="2 3" opacity="0.35">
    <line x1="200" y1="155" x2="200" y2="240"/>
    <line x1="240" y1="175" x2="240" y2="240"/>
    <line x1="280" y1="150" x2="280" y2="235"/>
    <line x1="320" y1="155" x2="320" y2="240"/>
  </g>
  <!-- Heart at sync point -->
  <g transform="translate(200,200)">
    <path d="M 0,0 C -4,-6 -12,-6 -12,2 C -12,8 0,16 0,16 C 0,16 12,8 12,2 C 12,-6 4,-6 0,0 Z"
          fill="#c96b6b" opacity="0.9"/>
  </g>
  <!-- Small heart echoes -->
  <g fill="#c96b6b" opacity="0.35">
    <circle cx="150" cy="198" r="2"/>
    <circle cx="250" cy="198" r="2"/>
    <circle cx="110" cy="200" r="1.2"/>
    <circle cx="290" cy="200" r="1.2"/>
  </g>
  <!-- Axis labels -->
  <text x="200" y="50" font-family="'Playfair Display',serif" font-style="italic" font-size="13" fill="#f5f0e8" text-anchor="middle" opacity="0.65">synchronizing</text>
  <text x="30" y="385" font-family="'JetBrains Mono',monospace" font-size="9" fill="#8a8075" letter-spacing="2">T=0</text>
  <text x="380" y="385" font-family="'JetBrains Mono',monospace" font-size="9" fill="#8a8075" letter-spacing="2" text-anchor="end">T=15min</text>
</svg>
