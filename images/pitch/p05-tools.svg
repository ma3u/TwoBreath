<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="A constellation showing Claude Code, DeepMind MCP, and Peec AI MCP orbiting TwoBreath, each connected to one of four marketing outcomes: tracked competitors, 150 prompts, site schema, and marketing videos for YouTube, Instagram, TikTok and Reddit">
  <defs>
    <radialGradient id="hp5-bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#2d9e8a" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#2d9e8a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hp5-glow" cx="50%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#dabe6a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#hp5-bg)"/>

  <!-- Caption -->
  <text x="200" y="46" font-family="'Playfair Display',serif" font-style="italic" font-size="13" fill="#dabe6a" text-anchor="middle" opacity="0.85">from invisible to indexed</text>

  <!-- Stars -->
  <g fill="#f5f0e8" opacity="0.4">
    <circle cx="60" cy="80" r="0.7"/>
    <circle cx="340" cy="60" r="0.6"/>
    <circle cx="80" cy="350" r="0.5"/>
    <circle cx="320" cy="350" r="0.5"/>
    <circle cx="50" cy="200" r="0.4"/>
    <circle cx="350" cy="200" r="0.4"/>
  </g>

  <!-- Subtle MCP ring -->
  <circle cx="200" cy="200" r="58" fill="none" stroke="#c9a84c" stroke-width="0.3" opacity="0.25"/>

  <!-- Center glow -->
  <ellipse cx="200" cy="200" rx="80" ry="80" fill="url(#hp5-glow)"/>

  <!-- Connecting lines: each MCP → its outcome(s) -->
  <g stroke="#8a8075" stroke-width="0.35" opacity="0.45">
    <!-- Claude Code (top) → site schema (top-left) and 150 prompts (top-right) -->
    <line x1="200" y1="148" x2="118" y2="108"/>
    <line x1="200" y1="148" x2="282" y2="108"/>
    <!-- Peec AI MCP (left) → competitors (bottom-left) and 150 prompts (top-right) -->
    <line x1="148" y1="200" x2="98" y2="295"/>
    <line x1="148" y1="200" x2="282" y2="108"/>
    <!-- DeepMind MCP (right) → marketing videos (bottom-right) -->
    <line x1="252" y1="200" x2="302" y2="295"/>
    <!-- Claude Code → site schema (already drawn) and orchestrates videos -->
    <line x1="200" y1="148" x2="302" y2="295" stroke-dasharray="1,2" opacity="0.35"/>
  </g>

  <!-- Inner ring: 3 MCPs -->
  <!-- Claude Code (top) -->
  <g transform="translate(200,148)">
    <circle r="22" fill="#2a2520" stroke="#c9a84c" stroke-width="1.3"/>
    <text y="-2" font-family="'JetBrains Mono',monospace" font-size="6.8" fill="#c9a84c" text-anchor="middle" letter-spacing="0.3">Claude</text>
    <text y="7" font-family="'JetBrains Mono',monospace" font-size="6.8" fill="#c9a84c" text-anchor="middle" letter-spacing="0.3">Code</text>
  </g>
  <!-- DeepMind MCP (right) -->
  <g transform="translate(252,200)">
    <circle r="22" fill="#2a2520" stroke="#2d9e8a" stroke-width="1.3"/>
    <text y="-2" font-family="'JetBrains Mono',monospace" font-size="6" fill="#2d9e8a" text-anchor="middle">DeepMind</text>
    <text y="7" font-family="'JetBrains Mono',monospace" font-size="6" fill="#2d9e8a" text-anchor="middle">MCP</text>
  </g>
  <!-- Peec AI MCP (left) -->
  <g transform="translate(148,200)">
    <circle r="22" fill="#2a2520" stroke="#c9a84c" stroke-width="1.3"/>
    <text y="-2" font-family="'JetBrains Mono',monospace" font-size="6.8" fill="#c9a84c" text-anchor="middle">Peec AI</text>
    <text y="7" font-family="'JetBrains Mono',monospace" font-size="6.8" fill="#c9a84c" text-anchor="middle">MCP</text>
  </g>

  <!-- Center: TwoBreath -->
  <g transform="translate(200,200)">
    <circle r="22" fill="#1a1714" stroke="#c9a84c" stroke-width="1.4"/>
    <text y="-2" font-family="'Playfair Display',serif" font-size="9" fill="#f5f0e8" text-anchor="middle">two</text>
    <text y="9" font-family="'Playfair Display',serif" font-size="9" fill="#2d9e8a" text-anchor="middle">breath</text>
  </g>

  <!-- Outer satellites: 4 phases -->
  <!-- Site schema (top-left) -->
  <g transform="translate(98,98)">
    <circle r="26" fill="#1a1714" stroke="#8a8075" stroke-width="0.6" opacity="0.95"/>
    <text y="-4" font-family="'JetBrains Mono',monospace" font-size="6" fill="#f5f0e8" text-anchor="middle">site</text>
    <text y="4" font-family="'JetBrains Mono',monospace" font-size="6" fill="#f5f0e8" text-anchor="middle">schema</text>
    <text y="12" font-family="'JetBrains Mono',monospace" font-size="6" fill="#dabe6a" text-anchor="middle">+ FAQ</text>
  </g>
  <!-- 150 prompts (top-right) -->
  <g transform="translate(302,98)">
    <circle r="26" fill="#1a1714" stroke="#8a8075" stroke-width="0.6" opacity="0.95"/>
    <text y="-4" font-family="'JetBrains Mono',monospace" font-size="6" fill="#f5f0e8" text-anchor="middle">150</text>
    <text y="4" font-family="'JetBrains Mono',monospace" font-size="6" fill="#f5f0e8" text-anchor="middle">prompts</text>
    <text y="12" font-family="'JetBrains Mono',monospace" font-size="5.5" fill="#dabe6a" text-anchor="middle">EN · DE · JP</text>
  </g>
  <!-- Competitors (bottom-left) -->
  <g transform="translate(98,302)">
    <circle r="26" fill="#1a1714" stroke="#8a8075" stroke-width="0.6" opacity="0.95"/>
    <text y="-4" font-family="'JetBrains Mono',monospace" font-size="6" fill="#f5f0e8" text-anchor="middle">7</text>
    <text y="4" font-family="'JetBrains Mono',monospace" font-size="6" fill="#f5f0e8" text-anchor="middle">competitors</text>
    <text y="12" font-family="'JetBrains Mono',monospace" font-size="6" fill="#dabe6a" text-anchor="middle">tracked</text>
  </g>
  <!-- Marketing videos (bottom-right) -->
  <g transform="translate(302,302)">
    <circle r="26" fill="#1a1714" stroke="#8a8075" stroke-width="0.6" opacity="0.95"/>
    <text y="-6" font-family="'JetBrains Mono',monospace" font-size="6" fill="#f5f0e8" text-anchor="middle">videos</text>
    <text y="3" font-family="'JetBrains Mono',monospace" font-size="5.5" fill="#dabe6a" text-anchor="middle">YT · IG</text>
    <text y="11" font-family="'JetBrains Mono',monospace" font-size="5.5" fill="#dabe6a" text-anchor="middle">TT · RD</text>
  </g>
</svg>
