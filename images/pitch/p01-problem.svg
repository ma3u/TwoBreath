<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Tokyo apartment at 11:47pm — woman on phone, partner distant, blue screen glow">
  <defs>
    <linearGradient id="hp1-night" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f0d0b"/>
      <stop offset="100%" stop-color="#1a1714"/>
    </linearGradient>
    <radialGradient id="hp1-lamp" cx="85%" cy="20%" r="35%">
      <stop offset="0%" stop-color="#dabe6a" stop-opacity="0.65"/>
      <stop offset="60%" stop-color="#c9a84c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hp1-screen" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3dbfaa" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2d9e8a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Night room -->
  <rect width="400" height="400" fill="url(#hp1-night)"/>

  <!-- Paper-lantern lamp glow (warm, top-right) -->
  <rect width="400" height="400" fill="url(#hp1-lamp)"/>
  <ellipse cx="340" cy="80" rx="14" ry="18" fill="#dabe6a" opacity="0.7"/>
  <ellipse cx="340" cy="80" rx="6" ry="8" fill="#f5f0e8" opacity="0.6"/>
  <line x1="340" y1="55" x2="340" y2="40" stroke="#dabe6a" stroke-width="0.4" opacity="0.5"/>

  <!-- Window with paper-lantern bokeh outside -->
  <rect x="40" y="50" width="110" height="160" fill="#0a0908" stroke="#3a322a" stroke-width="0.5" opacity="0.85"/>
  <line x1="95" y1="50" x2="95" y2="210" stroke="#3a322a" stroke-width="0.4"/>
  <line x1="40" y1="130" x2="150" y2="130" stroke="#3a322a" stroke-width="0.4"/>
  <!-- Distant bokeh -->
  <circle cx="65" cy="100" r="3" fill="#c9a84c" opacity="0.3"/>
  <circle cx="125" cy="80" r="2" fill="#c9a84c" opacity="0.45"/>
  <circle cx="105" cy="160" r="2.5" fill="#c96b6b" opacity="0.3"/>
  <circle cx="60" cy="180" r="1.5" fill="#dabe6a" opacity="0.35"/>
  <circle cx="135" cy="190" r="2" fill="#c9a84c" opacity="0.4"/>

  <!-- Couch low -->
  <path d="M 0,330 Q 0,310 30,310 L 400,310 L 400,400 L 0,400 Z" fill="#0a0908"/>
  <line x1="0" y1="312" x2="400" y2="312" stroke="#2a2520" stroke-width="0.4"/>

  <!-- HER (left center, holding phone) -->
  <g>
    <!-- Body, slumped forward over phone -->
    <path d="M 145,312 Q 138,265 158,232 Q 175,222 192,235 Q 200,260 195,312 Z" fill="#0a0908"/>
    <!-- Head, looking down -->
    <ellipse cx="170" cy="218" rx="15" ry="17" fill="#1a1714"/>
    <!-- Long hair, tied back -->
    <path d="M 156,212 Q 152,200 170,196 Q 186,200 184,214 Q 182,228 180,238 L 170,250 L 160,238 Q 158,225 156,212 Z" fill="#000"/>
    <!-- Phone (lit blue) in her hands at her lap -->
    <rect x="160" y="265" width="22" height="34" rx="3" fill="#0a0908" stroke="#3dbfaa" stroke-width="0.5"/>
    <rect x="162" y="268" width="18" height="28" rx="1" fill="#3dbfaa" opacity="0.6"/>
    <!-- Tiny text lines on screen -->
    <rect x="164" y="272" width="11" height="0.8" fill="#f5f0e8" opacity="0.6"/>
    <rect x="164" y="276" width="14" height="0.8" fill="#f5f0e8" opacity="0.4"/>
    <rect x="164" y="280" width="9" height="0.8" fill="#f5f0e8" opacity="0.5"/>
    <rect x="164" y="287" width="14" height="0.8" fill="#f5f0e8" opacity="0.4"/>
    <rect x="164" y="291" width="11" height="0.8" fill="#f5f0e8" opacity="0.4"/>
    <!-- Screen glow on her face -->
    <ellipse cx="170" cy="225" rx="22" ry="14" fill="url(#hp1-screen)"/>
  </g>

  <!-- HIM (right, on his own phone, half-distant) -->
  <g opacity="0.85">
    <path d="M 270,312 Q 265,275 280,250 Q 295,242 310,253 Q 318,275 313,312 Z" fill="#0a0908"/>
    <ellipse cx="290" cy="240" rx="14" ry="16" fill="#1a1714"/>
    <!-- Short hair -->
    <path d="M 276,236 Q 274,222 290,220 Q 308,222 304,236 Q 302,228 290,226 Q 278,228 276,236 Z" fill="#000"/>
    <!-- His phone, smaller blue -->
    <rect x="295" y="278" width="14" height="20" rx="2" fill="#0a0908" stroke="#3dbfaa" stroke-width="0.4"/>
    <rect x="296" y="280" width="12" height="16" rx="1" fill="#3dbfaa" opacity="0.4"/>
  </g>

  <!-- The space between them — emphasized -->
  <line x1="200" y1="280" x2="265" y2="280" stroke="#c96b6b" stroke-width="0.4" stroke-dasharray="2 4" opacity="0.5"/>

  <!-- Clock 23:47 -->
  <text x="200" y="55" font-family="'JetBrains Mono',monospace" font-size="14" fill="#c96b6b" text-anchor="middle" letter-spacing="3" opacity="0.85">23:47</text>

  <!-- Tiny ChatGPT prompt line -->
  <text x="200" y="380" font-family="'Playfair Display',serif" font-style="italic" font-size="12" fill="#3dbfaa" text-anchor="middle" opacity="0.7">二人でできる呼吸のアプリは？</text>
</svg>
