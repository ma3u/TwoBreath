<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Three couples in three cities — US, Japan, Germany — connected by a glowing line">
  <defs>
    <radialGradient id="hp2-bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hp2-thread" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#c9a84c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#hp2-bg)"/>

  <!-- Subtle horizon -->
  <line x1="0" y1="240" x2="400" y2="240" stroke="#f5f0e8" stroke-width="0.3" opacity="0.15"/>

  <!-- City silhouettes (US left, Japan center, Germany right) -->
  <!-- US: New York skyscrapers -->
  <g fill="#0f0d0b" opacity="0.85">
    <rect x="38" y="195" width="14" height="45"/>
    <rect x="55" y="180" width="12" height="60"/>
    <rect x="70" y="200" width="10" height="40"/>
    <rect x="83" y="185" width="14" height="55"/>
    <rect x="100" y="208" width="9" height="32"/>
  </g>
  <!-- Japan: Tokyo Tower silhouette -->
  <g fill="#0f0d0b" opacity="0.85">
    <path d="M 170,240 L 185,170 L 200,240 Z" fill="none" stroke="#0f0d0b" stroke-width="2"/>
    <line x1="185" y1="170" x2="185" y2="155" stroke="#0f0d0b" stroke-width="1.2"/>
    <rect x="155" y="200" width="8" height="40"/>
    <rect x="207" y="205" width="9" height="35"/>
    <rect x="222" y="195" width="11" height="45"/>
  </g>
  <!-- Germany: Brandenburg Gate / spire -->
  <g fill="#0f0d0b" opacity="0.85">
    <rect x="288" y="200" width="40" height="40"/>
    <rect x="294" y="190" width="6" height="50"/>
    <rect x="305" y="190" width="6" height="50"/>
    <rect x="316" y="190" width="6" height="50"/>
    <rect x="288" y="194" width="40" height="6"/>
    <!-- Spire -->
    <path d="M 308,194 L 304,180 L 312,180 Z"/>
    <rect x="345" y="208" width="10" height="32"/>
    <rect x="358" y="200" width="9" height="40"/>
  </g>

  <!-- Three couple silhouettes, one per city, each with thought bubble -->
  <!-- US Couple -->
  <g transform="translate(70,275)">
    <ellipse cx="-7" cy="0" rx="6" ry="7" fill="#1a1714"/>
    <ellipse cx="7" cy="0" rx="6" ry="7" fill="#1a1714"/>
    <path d="M -14,8 Q -14,30 0,30 Q 14,30 14,8 Z" fill="#1a1714"/>
    <text y="50" font-family="'JetBrains Mono',monospace" font-size="9" fill="#c9a84c" text-anchor="middle" letter-spacing="1">US</text>
  </g>
  <!-- Japan Couple (with phone glow) -->
  <g transform="translate(190,275)">
    <ellipse cx="-7" cy="0" rx="6" ry="7" fill="#1a1714"/>
    <ellipse cx="7" cy="0" rx="6" ry="7" fill="#1a1714"/>
    <path d="M -14,8 Q -14,30 0,30 Q 14,30 14,8 Z" fill="#1a1714"/>
    <!-- Tiny phone glow -->
    <rect x="-3" y="14" width="6" height="9" rx="1" fill="#3dbfaa" opacity="0.65"/>
    <text y="50" font-family="'JetBrains Mono',monospace" font-size="9" fill="#c9a84c" text-anchor="middle" letter-spacing="1">JAPAN</text>
  </g>
  <!-- Germany Couple -->
  <g transform="translate(308,275)">
    <ellipse cx="-7" cy="0" rx="6" ry="7" fill="#1a1714"/>
    <ellipse cx="7" cy="0" rx="6" ry="7" fill="#1a1714"/>
    <path d="M -14,8 Q -14,30 0,30 Q 14,30 14,8 Z" fill="#1a1714"/>
    <text y="50" font-family="'JetBrains Mono',monospace" font-size="9" fill="#c9a84c" text-anchor="middle" letter-spacing="1">GERMANY</text>
  </g>

  <!-- Thought bubble above each (the question mark — they're searching) -->
  <g fill="none" stroke="#e06363" stroke-width="0.7" opacity="0.7">
    <circle cx="70" cy="245" r="9"/>
    <circle cx="190" cy="245" r="9"/>
    <circle cx="308" cy="245" r="9"/>
  </g>
  <g fill="#e06363" font-family="'Playfair Display',serif" font-size="12" font-style="italic" text-anchor="middle" opacity="0.85">
    <text x="70" y="249">?</text>
    <text x="190" y="249">?</text>
    <text x="308" y="249">?</text>
  </g>

  <!-- The connecting thread (AnswerAtlas) -->
  <path d="M 70,255 Q 130,150 190,255 Q 250,150 308,255" fill="none" stroke="url(#hp2-thread)" stroke-width="1.2" stroke-dasharray="2 3" opacity="0.6"/>

  <!-- Apple Watch icons floating -->
  <g opacity="0.6">
    <rect x="34" y="328" width="14" height="18" rx="3" fill="#1a1714" stroke="#c9a84c" stroke-width="0.5"/>
    <rect x="36" y="330" width="10" height="14" rx="1" fill="#2d9e8a" opacity="0.6"/>
    <rect x="78" y="328" width="14" height="18" rx="3" fill="#1a1714" stroke="#c9a84c" stroke-width="0.5"/>
    <rect x="80" y="330" width="10" height="14" rx="1" fill="#c9a84c" opacity="0.5"/>
    <rect x="154" y="328" width="14" height="18" rx="3" fill="#1a1714" stroke="#e06363" stroke-width="0.5"/>
    <rect x="156" y="330" width="10" height="14" rx="1" fill="#e06363" opacity="0.4"/>
    <rect x="198" y="328" width="14" height="18" rx="3" fill="#1a1714" stroke="#e06363" stroke-width="0.5"/>
    <rect x="200" y="330" width="10" height="14" rx="1" fill="#e06363" opacity="0.4"/>
    <rect x="270" y="328" width="14" height="18" rx="3" fill="#1a1714" stroke="#c9a84c" stroke-width="0.5"/>
    <rect x="272" y="330" width="10" height="14" rx="1" fill="#c9a84c" opacity="0.5"/>
    <rect x="314" y="328" width="14" height="18" rx="3" fill="#1a1714" stroke="#e06363" stroke-width="0.5"/>
    <rect x="316" y="330" width="10" height="14" rx="1" fill="#e06363" opacity="0.4"/>
  </g>

  <!-- Title hint -->
  <text x="200" y="35" font-family="'Playfair Display',serif" font-style="italic" font-size="13" fill="#c9a84c" text-anchor="middle" opacity="0.65">three cities · the same silence</text>

  <!-- Tiny stars -->
  <g fill="#f5f0e8" opacity="0.4">
    <circle cx="60" cy="70" r="0.6"/>
    <circle cx="200" cy="55" r="0.5"/>
    <circle cx="350" cy="75" r="0.5"/>
    <circle cx="120" cy="100" r="0.5"/>
    <circle cx="280" cy="90" r="0.5"/>
  </g>
</svg>
