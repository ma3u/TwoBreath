    class: "D"
    note: "Anwendung nutzt ausschließlich Apple-Frameworks (SwiftUI, SwiftData, HealthKit, MultipeerConnectivity, NearbyInteraction, AVFoundation, WatchConnectivity). Keine Drittanbieter-Bibliotheken — Anforderung trivial erfüllt."
  O.Purp_8:
    status: "✅"
    class: "M"
    note: "Daten werden ausschließlich lokal verarbeitet (SwiftData) oder mit dem Partner-Gerät über MPC nach expliziter Bestätigung geteilt. Keine Drittanbieter-Schnittstellen."
