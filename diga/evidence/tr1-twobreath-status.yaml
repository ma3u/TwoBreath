  # (1) Anwendungszweck — O.Purp_*
  # ──────────────────────────────────────────
  O.Purp_1:
    status: "🟡"
    class: "M"
    note: "App-Store-Beschreibung deklariert Zweck (Atemübung); Info.plist usage strings deklarieren Datenzwecke. Formelle Erstinformation beim ersten Start zu auditieren."
  O.Purp_2:
    status: "✅"
    class: "M"
    note: "PrivacyInfo.xcprivacy: Health + Fitness ausschließlich für AppFunctionality, kein Tracking. HealthKit-Berechtigungen entsprechen den deklarierten Zwecken."
  O.Purp_3:
    status: "🟡"
    class: "M"
    note: "iOS-vermittelte Berechtigungsdialoge für HealthKit, LocalNetwork, NearbyInteraction. Eigene App-Einwilligungs-UI zusätzlich zum Plattform-Standard zu dokumentieren."
  O.Purp_4:
    status: "✅"
    class: "D"
    note: "Apple-HealthKit-API erzwingt Autorisierungsprüfung; bei Verweigerung kein Datenzugriff. Verifikation per Code-Review von HealthKitService.swift."
  O.Purp_5:
    status: "🟡"
    class: "M"
    note: "Plattform-Mechanismus (iOS Einstellungen) ermöglicht Widerruf. App-eigene UI mit Hinweis auf Konsequenzen empfohlen — heute partiell."
  O.Purp_6:
    status: "❌"
    class: "M"
    note: "Hersteller-Verzeichnis der Nutzereinwilligungen fehlt; iOS speichert Berechtigungsstatus, ist aber nicht als Hersteller-Verzeichnis abrufbar. Lücke."
  O.Purp_7:
    status: "✅"
    class: "D"
    note: "Anwendung nutzt ausschließlich Apple-Frameworks (SwiftUI, SwiftData, HealthKit, MultipeerConnectivity, NearbyInteraction, AVFoundation, WatchConnectivity). Keine Drittanbieter-Bibliotheken — Anforderung trivial erfüllt."
  O.Purp_8:
    status: "✅"
    class: "M"
    note: "Daten werden ausschließlich lokal verarbeitet (SwiftData) oder mit dem Partner-Gerät über MPC nach expliziter Bestätigung geteilt. Keine Drittanbieter-Schnittstellen."
  O.Purp_9:
    status: "✅"
    class: "M"
    note: "Anzeige beschränkt auf Atemphasen und Achtsamkeitsminuten. Keine sensiblen Datenelemente auf dem Bildschirm außerhalb des primären Zwecks."

