  O.Arch_1:
    status: "🟡"
    class: "M + D"
    note: "DevSecOps-Pipeline existiert (security.yml, ci.yml: gitleaks, swiftlint --strict, eslint, npm audit, Tests, Playwright). Formale 'Security-in-SDLC'-Dokumentation des Herstellers (Threat-Model, Secure-Coding-Standards) ergänzungsbedürftig."
  O.Arch_2:
    status: "❌"
    class: "M"
    note: "Datenlebenszyklus für HealthKit-Reads (HR/HRV/Schlaf) und Writes (Mindful-Minutes) sowie für SwiftData SessionLog ist im Code nachvollziehbar, aber nicht formal als Designdokument aufgesetzt. Lücke."
  O.Arch_3:
    status: "➖"
    class: "M"
    note: "Anwendung hält keine eigenen kryptographischen Schlüssel. MultipeerConnectivity-Sitzungsschlüssel werden plattformseitig verwaltet. Schlüsselrichtlinie nicht anwendbar — Plattform-Aussage zu dokumentieren."
  O.Arch_4:
    status: "✅"
    class: "D"
