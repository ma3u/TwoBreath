# Per-O.* status overrides for TwoBreath × TR-03161-1 v3.0 (25.03.2024).
#
# Authored 2026-05-02 from inspection of:
#   - TwoBreath-app/project.yml, Info.plist, *.entitlements, PrivacyInfo.xcprivacy
#   - TwoBreath-app/.github/workflows/{ci,security}.yml
#   - TwoBreath-app/.gitleaks.toml, .swiftlint.yml, .husky/
#   - TwoBreath-app/Shared/Services/{HealthKit,Pairing,ProximityPairing,Connectivity,Audio,Haptic,Workout}*
#   - TwoBreath-app/CLAUDE.md (architecture summary)
#
# Status legend: ✅ met · 🟡 partial · ❌ missing · ➖ N/A today (with trigger) · 🔍 to be determined.
# Class legend:  R real-time · D deploy-time · P periodic · M manual.
#
# This YAML is the single source of truth for the per-row determination.
# Re-run `make official-matrix` to regenerate COMPLIANCE_MATRIX_TR1_OFFICIAL.md.

defaults:
  notes: >-
    TwoBreath posture (snapshot 2026-05-02): iOS 17 + watchOS 10, Swift 6, SwiftUI,
    SwiftData. Zero third-party Swift dependencies (Apple frameworks only).
    HealthKit reads HR/HRV/Schlaf, schreibt Mindful-Minutes. MultipeerConnectivity +
    NearbyInteraction für Partner-Pairing. WatchConnectivity iPhone↔Watch.
    Kein Hintergrundsystem, keine Nutzerkonten, keine Authentifizierung.
    App-Store-Distribution + Apple Notarisation. CI: gitleaks, swiftlint --strict,
    eslint, npm audit (Build-Toolchain), iPhone- und Watch-Tests, Playwright (Web).
    PrivacyInfo.xcprivacy deklariert Health + Fitness, NSPrivacyTracking=false.
    ITSAppUsesNonExemptEncryption=false. Pre-Commit: husky.

